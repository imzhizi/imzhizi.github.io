  <div class="content" itemprop="articleBody">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/hint.css/2.4.1/hint.min.css"><h2 id="安装说明"><a href="#安装说明" class="headerlink" title="安装说明"></a>安装说明</h2><p>Homebrew 是 macOS 下的一个非常好用的包管理工具, caskroom 则是基于 Homebrew 构建的一个强大的应用程序管理器.</p>
<figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br></pre></td><td class="code"><pre><span class="line">$ brew tap homebrew/cask-versions</span><br><span class="line">$ brew cask install java8</span><br><span class="line"><span class="comment"># 需要输入 root 密码以完成安装</span></span><br><span class="line"><span class="comment"># 输入 java -version 测试安装是否成功</span></span><br><span class="line">$ java -version</span><br><span class="line">java version <span class="string">"1.8.0_192"</span></span><br><span class="line">Java(TM) SE Runtime Environment (build 1.8.0_192-b12)</span><br><span class="line">Java HotSpot(TM) 64-Bit Server VM (build 25.192-b12, mixed mode)</span><br><span class="line"></span><br><span class="line"><span class="comment"># 旧版本的 Java 已经不再被维护, 安装 Java8 以前版本的 JDK 并不容易</span></span><br><span class="line"><span class="comment"># 经过一番寻找, 可以使用 OpenJDK 的 zulu7</span></span><br><span class="line"><span class="comment"># 需要先把 caskroom/versions 加入下载源</span></span><br><span class="line">brew cask install zulu7</span><br></pre></td></tr></table></figure>
  </div>
</article>
